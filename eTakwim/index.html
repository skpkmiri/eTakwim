<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eTakwim SKPK Miri</title>
    
    <!-- 1. Tailwind CSS (Untuk Design) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. Babel (Untuk membaca kod React di dalam HTML) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 3. Import Maps (Pautan automatik kepada library React, Firebase & Ikon) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
            "firebase/analytics": "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>
</head>
<body class="bg-slate-50">
    <!-- Di sinilah aplikasi akan dipaparkan -->
    <div id="root"></div>

    <!-- 4. Kod Utama eTakwim (React + Firebase) -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAnalytics } from 'firebase/analytics';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from 'firebase/firestore';
        import { ChevronLeft, ChevronRight, Calendar as CalendarIcon, CheckCircle, XCircle, Clock, Plus, Trash2, ShieldAlert, UserCircle, List, Edit } from 'lucide-react';

        // --- Senarai IC & Peranan Penolong Kanan/Guru Besar ---
        const REKOD_PK = [
            { nama: 'Aziz bin Tahir', jawatan: 'Pentadbiran', ic: '810808135501', units: ['Pentadbiran'] },
            { nama: 'Mohamad Abidin bin Sipek', jawatan: 'PK Pentadbiran & Kurikulum', ic: '910110136471', units: ['Pentadbiran', 'Kurikulum'] },
            { nama: 'Ling Mee Choo', jawatan: 'PK HEM', ic: '880927135284', units: ['Hal Ehwal Murid (HEM)'] },
            { nama: 'Salihin bin Ahmad', jawatan: 'PK Kokurikulum', ic: '920422135815', units: ['Kokurikulum'] }
        ];

        // --- Senarai Nama Guru & Staf ---
        const SENARAI_GURU = [
            "AIDA MASTURINA BINTI HAMKA", "AIFA NUR BESTARI BINTI RADUAN", "ALEXANDER LIPA ANAK RANTIE", 
            "AZENI BIN MAT", "AZIZ BIN TAHIR", "BRYAN ANAK CONSTANT", "CHRISTIAN SIMON", 
            "DLIYANA ANAK JOHN", "EIFILISIA AMBER ANAK MERVIN", "EVELYN SENA ANAK USSIK", 
            "FAZRI BIN BAKERI", "HAIROL BIN ISMAIL", "HAZUANI BINTI HIPNI", "HELLEN RANJA ANAK BELI", 
            "HILWA HAYATI BINTI MOHAMAD AJALAN", "JACQUELINE TIONG HOE DING", "JERIAH ANAK SIMON", 
            "JIMMY ANAK PETER", "KAMARIA BINTI BUJANG", "KHAIRI BIN SAHARI", "LING MEE CHOO", 
            "MARIATI BINTI JULAIHI", "MARY JANE AMOI UMPANG ANAK DANIEL MAWAT", "MOHAMAD ABIDIN BIN SIPEK", 
            "MOHD RAFEEQ BIN SULAIMAN", "MUHAMMAD ZULHUSAINI BIN ABDUL WAHAB", "NORAISYAH BINTI ASHARI", 
            "NORMIRI BINTI ABDULLAH", "NUR AZLIN BINTI NORIZAN", "NUR FADZLIAH AMAL BINTI OSMAN", 
            "NUR HIDAYU BINTI YUSOP", "NURUL HUDA BTE MOHD IHWAN", "SABARIAH BINTI SOLHI", 
            "SALIHIN BIN AHMAD", "SYAEEZA LIANA BINTI RAMLI", "TENG RU YUN", "TING HUA EE", 
            "TING YU YONG", "VANITHA A/P SUBRAMANIAM", "WONG PICK KING", "ZEPRINA ANAK BENIK"
        ];

        // --- Konfigurasi Firebase Sekolah Cikgu ---
        const firebaseConfig = {
            apiKey: "AIzaSyDbpbyNS0GBM9gfuy0gj-0M4nwvipuWXMc",
            authDomain: "etakwimskpkm.firebaseapp.com",
            projectId: "etakwimskpkm",
            storageBucket: "etakwimskpkm.firebasestorage.app",
            messagingSenderId: "737554911326",
            appId: "1:737554911326:web:cd6b54f1ca2ff411b4a4cf",
            measurementId: "G-Y8TK6PWLZM"
        };

        const app = initializeApp(firebaseConfig);
        let analytics;
        try {
            analytics = getAnalytics(app);
        } catch (e) {
            console.log("Analytics tidak dapat dimuatkan", e);
        }
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "etakwimskpkm";

        function App() {
            // State Pengguna & Peranan (Lalai: Guru/User)
            const [user, setUser] = useState(null);
            const [role, setRole] = useState('user');

            // State Kalendar
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            
            // State Data & UI
            const [events, setEvents] = useState([]);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showApprovalModal, setShowApprovalModal] = useState(false);
            const [showIcModal, setShowIcModal] = useState(false);
            const [showListModal, setShowListModal] = useState(false);
            const [listFilter, setListFilter] = useState('ALL');
            const [approvingEventId, setApprovingEventId] = useState(null);
            const [icInput, setIcInput] = useState('');
            const [icError, setIcError] = useState('');
            const [approvalUnitFilter, setApprovalUnitFilter] = useState('ALL'); // State untuk filter unit kelulusan
            
            // State Edit (Kemaskini)
            const [isEditing, setIsEditing] = useState(false);
            const [editingId, setEditingId] = useState(null);

            // State Borang
            const [newEvent, setNewEvent] = useState({ 
                title: '', namaGuru: '', unit: '', kategori: 'PROGRAM SEKOLAH', description: '', time: '', startDate: '', endDate: ''
            });
            const [isSubmitting, setIsSubmitting] = useState(false);

            // 1. Pengesahan Firebase (Anonymous Login)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.error("Ralat log masuk:", error);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });
                return () => unsubscribe();
            }, []);

            // 2. Ambil Data Real-time dari Firestore
            useEffect(() => {
                if (!user) return;
                const eventsRef = collection(db, 'artifacts', appId, 'public', 'data', 'takwim_events');
                const unsubscribe = onSnapshot(
                    eventsRef,
                    (snapshot) => {
                        const fetchedEvents = [];
                        snapshot.forEach((doc) => {
                            fetchedEvents.push({ id: doc.id, ...doc.data() });
                        });
                        setEvents(fetchedEvents);
                    },
                    (error) => console.error("Ralat mengambil data takwim:", error)
                );
                return () => unsubscribe();
            }, [user]);

            // 3. Logik Kalendar
            const currentYear = currentDate.getFullYear();
            const currentMonth = currentDate.getMonth();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const firstDayOfMonth = new Date(currentYear, currentMonth, 1).getDay();

            const prevMonth = () => setCurrentDate(new Date(currentYear, currentMonth - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(currentYear, currentMonth + 1, 1));

            const monthNames = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];
            const dayNames = ["Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"];

            const generateDateString = (year, month, day) => {
                const mm = String(month + 1).padStart(2, '0');
                const dd = String(day).padStart(2, '0');
                return `${year}-${mm}-${dd}`;
            };

            // Helper untuk semak julat tarikh
            const isDateInRange = (target, start, end, fallback) => {
                const s = start || fallback;
                const e = end || fallback || s;
                if (!s) return false;
                return target >= s && target <= e;
            };

            // Helper untuk paparan teks tarikh (cth: 12 Ogo - 14 Ogo)
            const formatDisplayDate = (start, end, fallback) => {
                const s = start || fallback;
                const e = end || fallback || s;
                if (!s) return '';
                const sDate = new Date(s).toLocaleDateString('ms-MY', { day: '2-digit', month: 'short', year: 'numeric' });
                if (s === e) return sDate;
                const eDate = new Date(e).toLocaleDateString('ms-MY', { day: '2-digit', month: 'short', year: 'numeric' });
                return `${sDate} - ${eDate}`;
            };

            // Buka Modal Tambah (Reset Form)
            const openAddModal = () => {
                setIsEditing(false);
                setEditingId(null);
                setNewEvent({ title: '', namaGuru: '', unit: '', kategori: 'PROGRAM SEKOLAH', description: '', time: '', startDate: selectedDate, endDate: selectedDate });
                setShowAddModal(true);
            };

            // Buka Modal untuk Kemaskini (Isi Form)
            const handleEditClick = (eventToEdit) => {
                setIsEditing(true);
                setEditingId(eventToEdit.id);
                setNewEvent({
                    title: eventToEdit.title,
                    namaGuru: eventToEdit.namaGuru || '',
                    unit: eventToEdit.unit || '',
                    kategori: eventToEdit.kategori || 'PROGRAM SEKOLAH',
                    description: eventToEdit.description || '',
                    time: eventToEdit.time || '',
                    startDate: eventToEdit.startDate || eventToEdit.date,
                    endDate: eventToEdit.endDate || eventToEdit.date
                });
                setSelectedDate(eventToEdit.startDate || eventToEdit.date);
                setShowAddModal(true);
                setShowListModal(false); // Tutup senarai penuh jika dibuka dari sana
            };

            // 4. Pengurusan Firestore
            const handleAddEvent = async (e) => {
                e.preventDefault();
                if (!newEvent.title || !user) return;
                setIsSubmitting(true);
                try {
                    const eventData = {
                        title: newEvent.title,
                        namaGuru: newEvent.namaGuru,
                        unit: newEvent.unit,
                        kategori: newEvent.kategori,
                        description: newEvent.description,
                        time: newEvent.time || 'Sepanjang hari',
                        date: newEvent.startDate, // Legacy fallback
                        startDate: newEvent.startDate,
                        endDate: newEvent.endDate
                    };

                    if (isEditing) {
                        // Proses Kemaskini (Update)
                        const eventRef = doc(db, 'artifacts', appId, 'public', 'data', 'takwim_events', editingId);
                        await updateDoc(eventRef, eventData);
                    } else {
                        // Proses Tambah Baru (Create)
                        const newEventId = `event_${Date.now()}`;
                        const eventRef = doc(db, 'artifacts', appId, 'public', 'data', 'takwim_events', newEventId);
                        eventData.createdBy = user.uid;
                        eventData.status = (role === 'pk' || role === 'gb') ? 'approved' : 'pending';
                        eventData.createdAt = new Date().toISOString();
                        await setDoc(eventRef, eventData);
                    }
                    
                    setNewEvent({ title: '', namaGuru: '', unit: '', kategori: 'PROGRAM SEKOLAH', description: '', time: '', startDate: '', endDate: '' });
                    setShowAddModal(false);
                    setIsEditing(false);
                    setEditingId(null);
                } catch (error) {
                    console.error("Ralat menyimpan aktiviti:", error);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const initiateApproveEvent = (eventId) => {
                setApprovingEventId(eventId);
                setIcInput('');
                setIcError('');
                setShowIcModal(true);
            };

            const confirmApproveEvent = async () => {
                if (role !== 'pk' && role !== 'gb') return;
                const cleanIcInput = icInput.replace(/-/g, '').trim();
                
                // Cari aktiviti yang sedang disahkan
                const eventToApprove = events.find(e => e.id === approvingEventId);
                if (!eventToApprove) return;

                const eventUnit = eventToApprove.unit;

                // Semak IC dan pastikan kuasa unit bertepatan
                const authorizedPK = REKOD_PK.find(pk => {
                    const isIcMatch = pk.ic.replace(/-/g, '') === cleanIcInput;
                    const hasUnitAuth = eventUnit ? pk.units.includes(eventUnit) : true;
                    return isIcMatch && hasUnitAuth;
                });

                if (!authorizedPK) {
                    setIcError(`No. Kad Pengenalan tidak sah atau anda tiada akses pengesahan untuk Unit ${eventUnit || 'ini'}.`);
                    return;
                }

                try {
                    const eventRef = doc(db, 'artifacts', appId, 'public', 'data', 'takwim_events', approvingEventId);
                    await updateDoc(eventRef, { status: 'approved', diluluskanOlehIC: cleanIcInput, diluluskanOlehNama: authorizedPK.nama });
                    setShowIcModal(false);
                    setApprovingEventId(null);
                } catch (error) {
                    console.error("Ralat meluluskan aktiviti:", error);
                }
            };

            const handleDeleteEvent = async (eventId) => {
                try {
                    const eventRef = doc(db, 'artifacts', appId, 'public', 'data', 'takwim_events', eventId);
                    await deleteDoc(eventRef);
                } catch (error) {
                    console.error("Ralat memadam aktiviti:", error);
                }
            };

            // 5. Warna & Tapisan Paparan
            const getColorClass = (kategori, type = 'bg') => {
                switch(kategori) {
                    case 'CUTI': return type === 'bg' ? 'bg-red-100 text-red-800 border-red-200' : 'bg-red-500';
                    case 'PERINGATAN': return type === 'bg' ? 'bg-amber-100 text-amber-900 border-amber-300' : 'bg-amber-500';
                    case 'PROGRAM SEKOLAH': default: return type === 'bg' ? 'bg-emerald-100 text-emerald-800 border-emerald-200' : 'bg-emerald-500';
                }
            };

            const eventsForSelectedDate = events.filter(e => isDateInRange(selectedDate, e.startDate, e.endDate, e.date));
            const visibleEvents = events.filter(e => e.status === 'approved' || (e.status === 'pending' && (role === 'pk' || role === 'gb' || e.createdBy === user?.uid)));
            const pendingEventsCount = events.filter(e => e.status === 'pending').length;
            const pendingEventsList = events.filter(e => e.status === 'pending');

            if (!user) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen font-sans text-slate-800 pb-10">
                    {/* HEADER */}
                    <header className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <img src="logo.png" alt="Logo SKPK Miri" className="h-12 w-12 object-contain drop-shadow-sm" onError={(e) => { e.target.onerror = null; e.target.style.display='none'; }} />
                                <div>
                                    <h1 className="text-xl font-bold text-slate-900">eTakwim SKPK Miri</h1>
                                    <p className="text-sm text-slate-500">Sistem Pengurusan Aktiviti Rasmi</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="flex items-center bg-slate-100 rounded-lg p-1 border border-slate-200">
                                    <button onClick={() => setRole('user')} className={`px-3 py-1.5 text-sm rounded-md font-medium transition-colors flex items-center gap-2 ${role === 'user' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                        <UserCircle size={16} /> Guru
                                    </button>
                                    <button onClick={() => setRole('pk')} className={`px-3 py-1.5 text-sm rounded-md font-medium transition-colors flex items-center gap-2 ${role === 'pk' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                        <CheckCircle size={16} /> Penolong Kanan
                                    </button>
                                    <button onClick={() => setRole('gb')} className={`px-3 py-1.5 text-sm rounded-md font-medium transition-colors flex items-center gap-2 ${role === 'gb' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                        <ShieldAlert size={16} /> Guru Besar
                                    </button>
                                </div>

                                {(role === 'pk' || role === 'gb') && (
                                    <button onClick={() => setShowApprovalModal(true)} className="relative p-2 text-slate-600 hover:text-blue-600 transition-colors bg-slate-100 hover:bg-blue-50 rounded-full" title="Kelulusan Aktiviti">
                                        <Clock size={20} />
                                        {pendingEventsCount > 0 && (
                                            <span className="absolute top-0 right-0 -mt-1 -mr-1 flex h-5 w-5 items-center justify-center rounded-full bg-red-500 text-[10px] font-bold text-white shadow-sm ring-2 ring-white">
                                                {pendingEventsCount}
                                            </span>
                                        )}
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTENT */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {/* Petunjuk Warna */}
                        <div className="mb-6 flex flex-wrap gap-4 items-center text-sm font-medium bg-white px-4 py-3 rounded-xl border border-slate-200 shadow-sm">
                            <span className="text-slate-600 mr-2">Petunjuk Kalendar:</span>
                            <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-red-500"></span> Cuti</div>
                            <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-emerald-500"></span> Program Sekolah</div>
                            <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-amber-500"></span> Tarikh Akhir / Peringatan</div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* KALENDAR */}
                            <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="flex flex-col sm:flex-row justify-between items-center p-6 border-b border-slate-100 gap-4">
                                    <h2 className="text-2xl font-bold text-slate-800">
                                        {monthNames[currentMonth]} {currentYear}
                                    </h2>
                                    <div className="flex gap-2 flex-wrap justify-center">
                                        <button onClick={() => setShowListModal(true)} className="px-4 py-2 text-sm font-medium rounded-full hover:bg-slate-100 text-slate-700 border border-slate-200 transition flex items-center gap-2 bg-white shadow-sm">
                                            <List size={16} /> Senarai Penuh
                                        </button>
                                        <button onClick={prevMonth} className="p-2 rounded-full hover:bg-slate-100 text-slate-600 transition"><ChevronLeft size={20} /></button>
                                        <button onClick={() => setCurrentDate(new Date())} className="px-4 py-2 text-sm font-medium rounded-full hover:bg-slate-100 text-slate-700 border border-slate-200 transition bg-white shadow-sm">Hari Ini</button>
                                        <button onClick={nextMonth} className="p-2 rounded-full hover:bg-slate-100 text-slate-600 transition"><ChevronRight size={20} /></button>
                                    </div>
                                </div>

                                <div className="p-6">
                                    <div className="grid grid-cols-7 gap-1 mb-2">
                                        {dayNames.map(day => (
                                            <div key={day} className="text-center text-xs font-semibold text-slate-400 uppercase tracking-wider py-2">{day.substring(0, 3)}</div>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-7 gap-2">
                                        {Array.from({ length: firstDayOfMonth }).map((_, idx) => (
                                            <div key={`empty-${idx}`} className="h-24 rounded-lg bg-slate-50/50 border border-transparent"></div>
                                        ))}
                                        {Array.from({ length: daysInMonth }).map((_, idx) => {
                                            const day = idx + 1;
                                            const dateString = generateDateString(currentYear, currentMonth, day);
                                            const isToday = dateString === new Date().toISOString().split('T')[0];
                                            const isSelected = dateString === selectedDate;
                                            const dayEvents = visibleEvents.filter(e => isDateInRange(dateString, e.startDate, e.endDate, e.date));

                                            return (
                                                <button key={day} onClick={() => setSelectedDate(dateString)} className={`h-24 flex flex-col p-2 rounded-xl border transition-all duration-200 text-left focus:outline-none relative ${isSelected ? 'border-blue-500 bg-blue-50/30 ring-1 ring-blue-500' : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'}`}>
                                                    <span className={`text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full mb-1 ${isToday ? 'bg-blue-600 text-white' : 'text-slate-700'}`}>{day}</span>
                                                    <div className="flex-1 overflow-hidden w-full flex flex-col gap-1">
                                                        {dayEvents.slice(0, 2).map((ev, i) => (
                                                            <div key={i} className={`text-[10px] leading-tight px-1.5 py-0.5 rounded truncate font-medium border ${ev.status === 'pending' ? 'bg-slate-100 text-slate-500 border-slate-200 border-dashed' : getColorClass(ev.kategori, 'bg')}`}>{ev.title}</div>
                                                        ))}
                                                        {dayEvents.length > 2 && <div className="text-[10px] text-slate-500 font-medium px-1">+ {dayEvents.length - 2} lagi</div>}
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            {/* BUTIRAN HARI */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-fit lg:sticky lg:top-24">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                    <div>
                                        <h3 className="font-bold text-lg text-slate-800">
                                            {new Date(selectedDate).toLocaleDateString('ms-MY', { day: 'numeric', month: 'long', year: 'numeric' })}
                                        </h3>
                                        <p className="text-sm text-slate-500">Aktiviti pada tarikh ini</p>
                                    </div>
                                </div>

                                <div className="p-6 flex-1 overflow-y-auto max-h-[500px]">
                                    {eventsForSelectedDate.length === 0 ? (
                                        <div className="text-center py-12 flex flex-col items-center justify-center text-slate-400">
                                            <CalendarIcon size={48} className="mb-4 opacity-20" />
                                            <p>Tiada aktiviti dijadualkan.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {eventsForSelectedDate.map(event => (
                                                (role === 'pk' || role === 'gb' || event.status === 'approved' || event.createdBy === user.uid) && (
                                                    <div key={event.id} className={`p-4 rounded-xl border ${event.status === 'pending' ? 'border-slate-200 bg-slate-50 border-dashed' : getColorClass(event.kategori, 'bg')} group transition-colors relative overflow-hidden`}>
                                                        {event.status === 'approved' && <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${getColorClass(event.kategori, 'dot')}`}></div>}
                                                        
                                                        <div className="flex justify-between items-start mb-2 pl-2">
                                                            <h4 className="font-semibold text-slate-900">{event.title}</h4>
                                                            {event.status === 'pending' ? (
                                                                <span className="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-slate-200 text-slate-600 text-[10px] font-bold uppercase tracking-wider"><Clock size={12} /> Menunggu</span>
                                                            ) : (
                                                                <span className="inline-flex items-center gap-1 px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-white/60 text-slate-700 border border-black/5">{event.kategori || 'PROGRAM'}</span>
                                                            )}
                                                        </div>
                                                        
                                                        {/* Paparan Tarikh Julat (jika lebih dari 1 hari) pada Kad Butiran */}
                                                        {event.startDate && event.endDate && event.startDate !== event.endDate && (
                                                            <div className="text-xs font-medium text-blue-700 bg-blue-50/50 inline-block px-2 py-1 rounded mb-2 ml-2 border border-blue-100">
                                                                {formatDisplayDate(event.startDate, event.endDate, event.date)}
                                                            </div>
                                                        )}

                                                        <div className="text-sm text-slate-600 mb-2 flex items-center gap-3 flex-wrap pl-2">
                                                            <span className="flex items-center gap-1"><Clock size={14} className="text-slate-400"/> {event.time}</span>
                                                            {event.namaGuru && <span className="flex items-center gap-1"><UserCircle size={14} className="text-slate-400"/> {event.namaGuru}</span>}
                                                            {event.unit && <span className="flex items-center gap-1 bg-white/70 px-1.5 py-0.5 rounded text-xs border border-black/5">{event.unit}</span>}
                                                        </div>
                                                        {event.description && (
                                                            <div className="pl-2">
                                                                <p className="text-sm text-slate-700 bg-white/60 p-3 rounded-lg border border-black/5 mt-2">{event.description}</p>
                                                            </div>
                                                        )}
                                                        <div className="mt-4 flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            {role === 'pk' && event.status === 'pending' && (
                                                                <button onClick={() => initiateApproveEvent(event.id)} className="text-xs flex items-center gap-1 text-emerald-700 hover:text-emerald-800 bg-emerald-100 px-2 py-1 rounded border border-emerald-200"><CheckCircle size={14} /> Lulus</button>
                                                            )}
                                                            {(role === 'pk' || role === 'gb' || (role === 'user' && event.status === 'pending' && event.createdBy === user.uid)) && (
                                                                <>
                                                                    <button onClick={() => handleEditClick(event)} className="text-xs flex items-center gap-1 text-blue-600 hover:text-blue-700 bg-blue-50 px-2 py-1 rounded border border-blue-200"><Edit size={14} /> Edit</button>
                                                                    <button onClick={() => handleDeleteEvent(event.id)} className="text-xs flex items-center gap-1 text-red-600 hover:text-red-700 bg-red-50 px-2 py-1 rounded border border-red-200"><Trash2 size={14} /> Padam</button>
                                                                </>
                                                            )}
                                                        </div>
                                                    </div>
                                                )
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="p-6 border-t border-slate-100 bg-slate-50/50 rounded-b-2xl">
                                    <button onClick={openAddModal} className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-xl transition-colors shadow-sm"><Plus size={18} /> Cadang / Tambah Aktiviti</button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* MODAL: TAMBAH / KEMASKINI AKTIVITI */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <h3 className="font-bold text-lg text-slate-800">
                                        {isEditing ? 'Kemaskini Aktiviti' : (role === 'user' ? 'Cadang Aktiviti Baru' : 'Tambah Aktiviti Takwim')}
                                    </h3>
                                    <button onClick={() => setShowAddModal(false)} className="text-slate-400 hover:text-slate-600"><XCircle size={24} /></button>
                                </div>
                                <form onSubmit={handleAddEvent} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
                                        <select value={newEvent.kategori} onChange={(e) => setNewEvent({...newEvent, kategori: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none bg-slate-50">
                                            <option value="PROGRAM SEKOLAH">Program Sekolah</option>
                                            <option value="CUTI">Cuti</option>
                                            <option value="PERINGATAN">Peringatan</option>
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tarikh Mula</label>
                                            <input type="date" value={newEvent.startDate} onChange={(e) => setNewEvent({...newEvent, startDate: e.target.value, endDate: e.target.value > newEvent.endDate ? e.target.value : newEvent.endDate})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none bg-slate-50" required />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tarikh Tamat</label>
                                            <input type="date" value={newEvent.endDate} min={newEvent.startDate} onChange={(e) => setNewEvent({...newEvent, endDate: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none bg-slate-50" required />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Nama Guru / Staf</label>
                                            <select value={newEvent.namaGuru} onChange={(e) => setNewEvent({...newEvent, namaGuru: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none bg-white" required={role === 'user'}>
                                                <option value="">-- Pilih Nama --</option>
                                                {SENARAI_GURU.map(guru => (
                                                    <option key={guru} value={guru}>{guru}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Pengesahan Unit (PK)</label>
                                            <select value={newEvent.unit} onChange={(e) => setNewEvent({...newEvent, unit: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none bg-white" required={role === 'user'}>
                                                <option value="">-- Pilih Unit --</option>
                                                <option value="Pentadbiran">Pentadbiran</option>
                                                <option value="Kurikulum">Kurikulum</option>
                                                <option value="Hal Ehwal Murid (HEM)">Hal Ehwal Murid (HEM)</option>
                                                <option value="Kokurikulum">Kokurikulum</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Program / Tajuk</label>
                                        <input type="text" value={newEvent.title} onChange={(e) => setNewEvent({...newEvent, title: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Masa</label>
                                        <input type="text" value={newEvent.time} onChange={(e) => setNewEvent({...newEvent, time: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none" placeholder="Cth: 8:00 Pagi - 12:00 Tengahari" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Keterangan</label>
                                        <textarea value={newEvent.description} onChange={(e) => setNewEvent({...newEvent, description: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none min-h-[100px]" placeholder="Tempat, sasaran..."></textarea>
                                    </div>
                                    <div className="pt-4 border-t border-slate-100 flex justify-end gap-3">
                                        <button type="button" onClick={() => setShowAddModal(false)} className="px-5 py-2.5 text-sm font-medium text-slate-600 bg-slate-100 rounded-lg">Batal</button>
                                        <button type="submit" disabled={isSubmitting} className="px-5 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg disabled:opacity-70">
                                            {isSubmitting ? 'Menyimpan...' : (isEditing ? 'Kemaskini' : ((role === 'pk' || role === 'gb') ? 'Simpan' : 'Hantar'))}
                                        </button>
                                    </div>
                                    {!isEditing && role === 'user' && (
                                        <p className="text-xs text-amber-600 flex items-start gap-1.5 bg-amber-50 p-3 rounded-lg border border-amber-100">
                                            <ShieldAlert size={14} className="shrink-0 mt-0.5" /> Nota: Memerlukan pengesahan PK.
                                        </p>
                                    )}
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: KELULUSAN PK */}
                    {showApprovalModal && (role === 'pk' || role === 'gb') && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[80vh] flex flex-col">
                                <div className="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/50">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-amber-100 p-2 rounded-lg text-amber-700"><Clock size={20} /></div>
                                        <div>
                                            <h3 className="font-bold text-lg text-slate-800">Senarai Menunggu</h3>
                                            <p className="text-sm text-slate-500">{pendingEventsCount} aktiviti dicadangkan</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3 w-full sm:w-auto">
                                        <select value={approvalUnitFilter} onChange={(e) => setApprovalUnitFilter(e.target.value)} className="border rounded-lg px-3 py-2 outline-none text-sm font-medium">
                                            <option value="ALL">Semua Unit</option>
                                            <option value="Pentadbiran">Pentadbiran</option>
                                            <option value="Kurikulum">Kurikulum</option>
                                            <option value="Hal Ehwal Murid (HEM)">Hal Ehwal Murid (HEM)</option>
                                            <option value="Kokurikulum">Kokurikulum</option>
                                        </select>
                                        <button onClick={() => setShowApprovalModal(false)} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full"><XCircle size={20} /></button>
                                    </div>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1 bg-slate-50/30">
                                    {pendingEventsList.filter(e => approvalUnitFilter === 'ALL' || e.unit === approvalUnitFilter).length === 0 ? (
                                        <div className="text-center py-12 text-slate-500">Tiada aktiviti tertunggak untuk kategori ini.</div>
                                    ) : (
                                        <div className="space-y-4">
                                            {pendingEventsList
                                                .filter(event => approvalUnitFilter === 'ALL' || event.unit === approvalUnitFilter)
                                                .map(event => (
                                                <div key={event.id} className="bg-white p-5 rounded-xl border flex flex-col sm:flex-row gap-4 justify-between items-start">
                                                    <div>
                                                        <span className="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded mr-2 whitespace-nowrap">{formatDisplayDate(event.startDate, event.endDate, event.date)}</span>
                                                        {event.unit && <span className="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-0.5 rounded mr-2 uppercase">UNIT {event.unit}</span>}
                                                        <span className="text-slate-400 text-sm">{event.time}</span>
                                                        <h4 className="font-bold text-lg mt-1">{event.title}</h4>
                                                        {event.namaGuru && <p className="text-sm text-slate-600 mt-1 flex items-center gap-1"><UserCircle size={14}/> {event.namaGuru}</p>}
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => handleDeleteEvent(event.id)} className="px-4 py-2 border border-red-200 text-red-600 rounded-lg text-sm hover:bg-red-50 transition"><XCircle size={16} /> Tolak</button>
                                                        <button onClick={() => initiateApproveEvent(event.id)} className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700 transition"><CheckCircle size={16} /> Lulus</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: PENGESAHAN IC */}
                    {showIcModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
                                <div className="p-6 border-b border-slate-100">
                                    <h3 className="font-bold text-lg">Sahkan Pengesahan</h3>
                                    <p className="text-sm text-slate-500 mt-1">
                                        Sila masukkan No. Kad Pengenalan anda.
                                        {events.find(e => e.id === approvingEventId)?.unit && (
                                            <span className="block mt-1 font-semibold text-indigo-600">Unit Terlibat: {events.find(e => e.id === approvingEventId).unit}</span>
                                        )}
                                    </p>
                                </div>
                                <div className="p-6 space-y-4">
                                    <input type="text" value={icInput} onChange={(e) => setIcInput(e.target.value)} placeholder="Masukkan IC anda (Cth: 910110136471)" className="w-full border rounded-lg px-4 py-3 text-center text-lg" />
                                    {icError && <p className="text-red-500 text-sm text-center bg-red-50 p-2 rounded">{icError}</p>}
                                </div>
                                <div className="p-4 bg-slate-50 flex justify-end gap-3">
                                    <button onClick={() => setShowIcModal(false)} className="px-5 py-2.5 border border-slate-200 rounded-lg bg-white text-slate-600 hover:bg-slate-100 transition">Batal</button>
                                    <button onClick={confirmApproveEvent} className="px-5 py-2.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition">Sahkan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: SENARAI PENUH */}
                    {showListModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-4xl max-h-[85vh] flex flex-col">
                                <div className="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/50">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-blue-100 p-2 rounded-lg text-blue-700"><List size={20} /></div>
                                        <div>
                                            <h3 className="font-bold text-lg text-slate-800">Senarai Penuh</h3>
                                            <p className="text-sm text-slate-500">Semua aktiviti yang dipaparkan dalam takwim</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3 w-full sm:w-auto">
                                        <select value={listFilter} onChange={(e) => setListFilter(e.target.value)} className="border border-slate-300 rounded-lg px-3 py-2 outline-none text-sm font-medium">
                                            <option value="ALL">Semua Kategori</option>
                                            <option value="PROGRAM SEKOLAH">Program</option>
                                            <option value="CUTI">Cuti</option>
                                            <option value="PERINGATAN">Peringatan</option>
                                        </select>
                                        <button onClick={() => setShowListModal(false)} className="p-2 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-full transition"><XCircle size={20} /></button>
                                    </div>
                                </div>
                                <div className="overflow-y-auto flex-1 bg-white p-0">
                                    <div className="min-w-[600px]">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 sticky top-0 border-b border-slate-200">
                                                <tr>
                                                    <th className="py-4 px-6 font-semibold text-slate-600">Tarikh</th>
                                                    <th className="py-4 px-6 font-semibold text-slate-600">Kategori</th>
                                                    <th className="py-4 px-6 font-semibold text-slate-600">Aktiviti / Program</th>
                                                    <th className="py-4 px-6 font-semibold text-slate-600">Masa</th>
                                                    <th className="py-4 px-6 font-semibold text-slate-600 text-center">Tindakan</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {[...visibleEvents].filter(event => listFilter === 'ALL' || event.kategori === listFilter).sort((a, b) => new Date(a.startDate || a.date) - new Date(b.startDate || b.date)).map((event) => (
                                                    <tr key={event.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                        <td className="py-3 px-6 whitespace-nowrap text-slate-700 font-medium">{formatDisplayDate(event.startDate, event.endDate, event.date)}</td>
                                                        <td className="py-3 px-6"><span className={`inline-block px-2.5 py-1 rounded-md text-[10px] font-bold tracking-wider uppercase ${getColorClass(event.kategori, 'bg')}`}>{event.kategori}</span></td>
                                                        <td className="py-3 px-6">
                                                            <div className="font-semibold text-slate-800">{event.title}</div>
                                                            {(event.namaGuru || event.unit) && (
                                                                <div className="text-xs text-slate-500 mt-1 flex items-center gap-1.5">
                                                                    {event.namaGuru && <span>{event.namaGuru}</span>}
                                                                    {event.namaGuru && event.unit && <span>•</span>}
                                                                    {event.unit && <span>{event.unit}</span>}
                                                                </div>
                                                            )}
                                                        </td>
                                                        <td className="py-3 px-6 text-slate-600">{event.time}</td>
                                                        <td className="py-3 px-6 text-center">
                                                            {(role === 'pk' || role === 'gb' || (role === 'user' && event.status === 'pending' && event.createdBy === user.uid)) ? (
                                                                <div className="flex items-center justify-center gap-2">
                                                                    <button onClick={() => handleEditClick(event)} className="text-blue-500 hover:text-blue-700 hover:bg-blue-50 p-1.5 rounded transition-colors" title="Kemaskini Aktiviti"><Edit size={16} /></button>
                                                                    <button onClick={() => handleDeleteEvent(event.id)} className="text-red-500 hover:text-red-700 hover:bg-red-50 p-1.5 rounded transition-colors" title="Padam Aktiviti"><Trash2 size={16} /></button>
                                                                </div>
                                                            ) : (
                                                                <span className="text-slate-300">-</span>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ))}
                                                {visibleEvents.filter(event => listFilter === 'ALL' || event.kategori === listFilter).length === 0 && (
                                                    <tr>
                                                        <td colSpan="5" className="text-center py-12 text-slate-500">
                                                            Tiada aktiviti didaftarkan untuk kategori ini.
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // --- Render React ke dalam HTML ---
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
